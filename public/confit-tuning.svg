<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5f5f5"/>

  <!-- Main card -->
  <rect x="15" y="20" width="170" height="160" rx="8" fill="white" stroke="#7b1fa2" stroke-width="2.5"/>

  <!-- Header with purple -->
  <rect x="15" y="20" width="170" height="35" rx="8" fill="#7b1fa2"/>
  <text x="100" y="45" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">CONFIT</text>

  <!-- Graph representation - optimization curve -->
  <svg x="25" y="60" width="150" height="75" viewBox="0 0 150 75">
    <!-- Grid -->
    <line x1="10" y1="65" x2="140" y2="65" stroke="#e0e0e0" stroke-width="1"/>
    <line x1="10" y1="10" x2="10" y2="65" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Optimization curve -->
    <path d="M 20 50 Q 40 35 60 20 T 120 10" stroke="#7b1fa2" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Data points -->
    <circle cx="20" cy="50" r="3" fill="#7b1fa2"/>
    <circle cx="40" cy="35" r="3" fill="#9c27b0"/>
    <circle cx="60" cy="20" r="3" fill="#7b1fa2"/>
    <circle cx="80" cy="15" r="3" fill="#9c27b0"/>
    <circle cx="100" cy="12" r="3" fill="#7b1fa2"/>
    <circle cx="120" cy="10" r="3" fill="#ba68c8" stroke="#7b1fa2" stroke-width="1.5"/>

    <!-- Axis labels -->
    <text x="5" y="75" font-family="Arial" font-size="8" fill="#666">Iterations</text>
    <text x="115" y="5" font-family="Arial" font-size="8" fill="#666">Performance</text>
  </svg>

  <!-- Hyperparameter tags -->
  <rect x="25" y="145" width="50" height="16" rx="3" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="50" y="156" font-family="Arial, sans-serif" font-size="9" fill="#7b1fa2" text-anchor="middle" font-weight="600">LR Tuning</text>

  <rect x="85" y="145" width="50" height="16" rx="3" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="110" y="156" font-family="Arial, sans-serif" font-size="9" fill="#7b1fa2" text-anchor="middle" font-weight="600">Weak Boost</text>

  <!-- Title -->
  <text x="25" y="172" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#1a1a1a">Resume-JD Alignment</text>
</svg>
