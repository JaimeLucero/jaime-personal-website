<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5f5f5"/>

  <!-- Main card -->
  <rect x="15" y="20" width="170" height="160" rx="8" fill="white" stroke="#1976d2" stroke-width="2.5"/>

  <!-- Header with blue -->
  <rect x="15" y="20" width="170" height="35" rx="8" fill="#1976d2"/>
  <text x="100" y="45" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">LayoutLMv3</text>

  <!-- Resume document representation -->
  <rect x="30" y="70" width="45" height="70" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>

  <!-- Document sections -->
  <rect x="34" y="75" width="37" height="8" fill="#1976d2" opacity="0.8"/>
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="6" fill="white" text-anchor="middle" font-weight="bold">HEADER</text>

  <line x1="34" y1="88" x2="71" y2="88" stroke="#1976d2" stroke-width="1" opacity="0.5"/>
  <line x1="34" y1="93" x2="71" y2="93" stroke="#1976d2" stroke-width="1" opacity="0.5"/>

  <rect x="34" y="100" width="37" height="12" fill="#bbdefb" opacity="0.6"/>
  <text x="50" y="107" font-family="Arial, sans-serif" font-size="6" fill="#1976d2" text-anchor="middle">EDU</text>

  <rect x="34" y="116" width="37" height="12" fill="#90caf9" opacity="0.6"/>
  <text x="50" y="123" font-family="Arial, sans-serif" font-size="6" fill="#1976d2" text-anchor="middle">EXP</text>

  <!-- Arrow to embeddings -->
  <path d="M 80 105 L 100 105" stroke="#1976d2" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Embedding representation -->
  <circle cx="115" cy="100" r="6" fill="#1976d2"/>
  <circle cx="125" cy="92" r="6" fill="#42a5f5"/>
  <circle cx="135" cy="105" r="6" fill="#64b5f6"/>
  <circle cx="125" cy="115" r="6" fill="#90caf9"/>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976d2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="25" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">Resume Section</text>
  <text x="25" y="168" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a">Embeddings</text>
</svg>
