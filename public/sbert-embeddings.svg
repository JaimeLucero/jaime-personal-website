<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f5f5f5"/>

  <!-- Main card -->
  <rect x="15" y="20" width="170" height="160" rx="8" fill="white" stroke="#f57c00" stroke-width="2.5"/>

  <!-- Header with Colab orange -->
  <rect x="15" y="20" width="170" height="35" rx="8" fill="#f57c00"/>
  <text x="100" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SBERT</text>

  <!-- Title -->
  <text x="25" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#1a1a1a">Job Description</text>
  <text x="25" y="92" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#1a1a1a">Embeddings</text>

  <!-- Embedding visualization - circles representing embeddings -->
  <circle cx="130" cy="65" r="8" fill="#f57c00" opacity="0.7"/>
  <circle cx="145" cy="75" r="7" fill="#ff9800" opacity="0.6"/>
  <circle cx="150" cy="92" r="8" fill="#f57c00" opacity="0.5"/>
  <circle cx="140" cy="105" r="6" fill="#ff9800" opacity="0.7"/>
  <circle cx="125" cy="110" r="7" fill="#f57c00" opacity="0.6"/>

  <!-- Connecting lines -->
  <line x1="130" y1="65" x2="140" y2="75" stroke="#f57c00" stroke-width="1" opacity="0.4"/>
  <line x1="145" y1="75" x2="150" y2="92" stroke="#ff9800" stroke-width="1" opacity="0.4"/>
  <line x1="150" y1="92" x2="140" y2="105" stroke="#f57c00" stroke-width="1" opacity="0.4"/>

  <!-- Feature tags -->
  <rect x="25" y="125" width="55" height="18" rx="4" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="52" y="137" font-family="Arial, sans-serif" font-size="10" fill="#f57c00" text-anchor="middle" font-weight="600">Text Pairs</text>

  <rect x="90" y="125" width="55" height="18" rx="4" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="117" y="137" font-family="Arial, sans-serif" font-size="10" fill="#f57c00" text-anchor="middle" font-weight="600">Features</text>

  <!-- Metrics indicator -->
  <text x="25" y="160" font-family="Arial, sans-serif" font-size="9" fill="#666">MRR@K • Precision@K</text>
</svg>
